<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT E. | Project Intake</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Exo 2', sans-serif; background-color: #89CFF0; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 650px; width: 100%; background: #ffffff; padding: 30px; border: 3px solid #000; box-shadow: 12px 12px 0px #004a99; position: relative; }
        header { border-bottom: 5px solid #000; margin-bottom: 25px; padding-bottom: 10px; text-align: center; }
        header h1 { text-transform: uppercase; font-size: 1.8rem; margin: 0; color: #004a99; }
        
        .section-title { background: #000; color: #fff; padding: 5px 10px; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 15px; display: inline-block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 2px solid #000; background-color: #f9f9f9; font-family: inherit; box-sizing: border-box; }

        /* SPEED FAB STYLING */
        .speed-fab-container { margin: 20px 0; padding: 15px; border: 2px dashed #ff9900; background: #fff9f0; text-align: center; }
        .speed-btn { background: #ff9900; color: #000; border: 3px solid #000; padding: 12px 25px; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: 4px 4px 0px #000; display: inline-block; }
        .speed-btn.active { background: #33cc33; color: white; box-shadow: none; transform: translateY(2px); }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border: 5px solid #ff9900; max-width: 400px; text-align: center; box-shadow: 15px 15px 0px #000; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .confirm-btn { background: #000; color: #fff; border: none; padding: 10px 20px; font-weight: 900; cursor: pointer; }
        .cancel-btn { background: #ccc; color: #333; border: none; padding: 10px 20px; font-weight: 900; cursor: pointer; }

        .submit-btn { display: block; width: 100%; background-color: #004a99; color: #00d4ff; text-align: center; padding: 15px; font-weight: 900; text-transform: uppercase; border: 3px solid #000; box-shadow: 6px 6px 0px #000; cursor: pointer; }
        .submit-btn.disabled { background-color: #ccc !important; color: #888 !important; cursor: not-allowed; pointer-events: none; box-shadow: none !important; }
    </style>
</head>
<body>

<div class="modal-overlay" id="speedModal">
    <div class="modal-content">
        <h2>⚡ Priority Intake</h2>
        <p>Choosing <strong>SPEED FABRICATION</strong> initiates priority scheduling.</p>
        <p style="color: #d00;">Note: Adds a 15% surcharge to the final quote.</p>
        <div class="modal-btns">
            <button class="confirm-btn" id="acceptSpeed">ACCEPT +15%</button>
            <button class="cancel-btn" id="closeModal">DECLINE</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <h1>AMT ENGINEERING</h1>
        <p style="font-weight: bold;">Project Intake Portal</p>
    </header>

    <form id="orderForm">
        <div class="section-title">01. Contact Info</div>
        <div class="form-grid">
            <div class="form-group full-width"><label>Client Full Name</label><input type="text" id="name" required></div>
            <div class="form-group"><label>Mobile Number</label><input type="text" id="phone" required></div>
            <div class="form-group"><label>Email</label><input type="text" id="email"></div>
        </div>

        <div class="section-title">02. Project Selection</div>
        <div class="form-grid">
            <div class="form-group">
                <label>Job Type</label>
                <select id="jobType" required>
                    <option value="">Choose Type...</option>
                    <option value="Custom Fabrication">Custom Fabrication</option>
                    <option value="Bulk Order">Bulk Production</option>
                    <option value="Repair/Restoration">Repair & Restoration</option>
                    <option value="Prototyping">R&D / Prototyping</option>
                </select>
            </div>
            <div class="form-group">
                <label>Material Preference</label>
                <select id="material" required>
                    <option value="Mild Steel">Mild Steel</option>
                    <option value="Stainless">Stainless Steel</option>
                    <option value="Aluminum">Aluminum</option>
                    <option value="Other">Other (Discuss F2F)</option>
                </select>
            </div>
            <div class="form-group full-width"><label>Project Notes</label><textarea id="notes" rows="3" placeholder="Describe the build..."></textarea></div>
            <div class="form-group full-width">
                <label>Blueprint/Reference (Storage Pending)</label>
                <input type="text" disabled placeholder="File upload currently disabled - Bring files F2F">
            </div>
        </div>

        <div class="speed-fab-container">
            <div id="speedBtn" class="speed-btn">⚡ Enable Speed Fabrication</div>
            <p id="speedStatus" style="font-size: 0.7rem; margin-top: 5px; color: #666;">Standard Queue Selected</p>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn disabled">Submit to Backend</button>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDX2_UkRC-NnFMZfLUH6NbYcBTjbuL8bFo",
        authDomain: "amt-engr.firebaseapp.com",
        projectId: "amt-engr",
        messagingSenderId: "74892673141",
        appId: "1:74892673141:web:b647649463519ddcaa383c",
        databaseURL: "https://amt-engr-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let isSpeedFab = false;

    // UI Logic
    const speedBtn = document.getElementById('speedBtn');
    const speedModal = document.getElementById('speedModal');
    const speedStatus = document.getElementById('speedStatus');

    speedBtn.onclick = () => {
        if(!isSpeedFab) speedModal.style.display = 'flex';
        else {
            isSpeedFab = false;
            speedBtn.classList.remove('active');
            speedBtn.innerHTML = "⚡ Enable Speed Fabrication";
            speedStatus.innerHTML = "Standard Queue Selected";
        }
    };

    document.getElementById('closeModal').onclick = () => speedModal.style.display = 'none';
    document.getElementById('acceptSpeed').onclick = () => {
        isSpeedFab = true;
        speedBtn.classList.add('active');
        speedBtn.innerHTML = "⚡ SPEED FAB ACTIVE";
        speedStatus.innerHTML = "Priority +15% Surcharge Applied";
        speedModal.style.display = 'none';
    };

    // Validation
    const form = document.getElementById('orderForm');
    const submitBtn = document.getElementById('submitBtn');
    const requiredInputs = form.querySelectorAll('[required]');

    function checkInputs() {
        let allFilled = true;
        requiredInputs.forEach(input => { if (!input.value.trim()) allFilled = false; });
        allFilled ? submitBtn.classList.remove('disabled') : submitBtn.classList.add('disabled');
    }
    form.addEventListener('input', checkInputs);

    // SUBMIT TO BACKEND (No Storage seeking)
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        submitBtn.innerHTML = "UPLOADING TO DATABASE...";
        submitBtn.classList.add('disabled');

        database.ref('detailed_orders').push({
            client_name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            job_type: document.getElementById('jobType').value,
            material: document.getElementById('material').value,
            notes: document.getElementById('notes').value,
            priority_mode: isSpeedFab ? "SPEED FAB (+15%)" : "Standard",
            timestamp: new Date().toLocaleString()
        }).then(() => {
            window.location.href = "003.html";
        }).catch((err) => {
            alert("Database Error: " + err.message);
            submitBtn.innerHTML = "Submit to Backend";
            submitBtn.classList.remove('disabled');
        });
    });
</script>
</body>
</html>
